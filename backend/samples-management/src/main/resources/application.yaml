server:
  port: 8082 #Puerto para Samples Management
  servlet:
    context-path: /lumentrack/samples
spring:
  application:
    name: samples-management
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  datasource:
    url: ${AIVEN_DB_URL}
    username: ${AIVEN_DB_USER}
    password: ${AIVEN_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update # or 'create', 'create-drop', 'none'
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        dialect: org.hibernate.dialect.MySQLDialect
cloudinary:
  cloud_name: ${CLOUDINARY_NAME}
  api_key: ${CLOUDINARY_KEY}
  api_secret: ${CLOUDINARY_SECRET}
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always # Esto permite que Actuator verifique la conexión a la DB

